<svg width="1152" height="400" viewBox="0 0 720 250" class="fig-svg" role="img" aria-label="Один GET-запит на замовлення 42, версіонований трьома способами. Рядок 1, URI path: GET /v2/orders/42 — версія в шляху; видима й кешовна. Рядок 2, власний header: GET /orders/42 з header API-Version 2 — URI лишається чистим, але кеші мають vary по header. Рядок 3, media type: GET /orders/42 з Accept application/vnd.acme.order.v2+json — версія їде на content negotiation, HTTP-нативний, але найменш оснащений тулінгом варіант."><rect x="0" y="0" width="720" height="250" fill="#0e1217"/><g><text x="16" y="42" fill="#a78bfa" font-size="12" font-family="'JetBrains Mono', monospace" font-weight="700">URI path</text><text x="16" y="58" fill="#6b7886" font-size="9" font-family="Inter, sans-serif">видимо · кешовно</text><rect x="190" y="20" width="516" height="44" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="190" y="20" width="4" height="44" rx="2" fill="#a78bfa"></rect></g><g><text x="16" y="118" fill="#4dc4d4" font-size="12" font-family="'JetBrains Mono', monospace" font-weight="700">Header</text><text x="16" y="134" fill="#6b7886" font-size="9" font-family="Inter, sans-serif">чистий URI · vary по ньому</text><rect x="190" y="96" width="516" height="52" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="190" y="96" width="4" height="52" rx="2" fill="#4dc4d4"></rect></g><g><text x="16" y="194" fill="#f2a93b" font-size="12" font-family="'JetBrains Mono', monospace" font-weight="700">Media type</text><text x="16" y="210" fill="#6b7886" font-size="9" font-family="Inter, sans-serif">HTTP-нативно · складно</text><rect x="190" y="172" width="516" height="52" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="190" y="172" width="4" height="52" rx="2" fill="#f2a93b"></rect></g><text x="208" y="48" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#a7b4c2" font-weight="700">GET</text><text x="244" y="48" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#e9eef3">/</text><text x="252" y="48" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#f2a93b" font-weight="700">v2</text><text x="268" y="48" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#e9eef3">/orders/42</text><text x="208" y="120" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">GET /orders/42</text><text x="208" y="140" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#4dc4d4">API-Version:</text><text x="306" y="140" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#f2a93b" font-weight="700">2</text><text x="208" y="196" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">GET /orders/42</text><text x="208" y="216" font-size="11" font-family="'JetBrains Mono', monospace" fill="#f2a93b">Accept:</text><text x="261" y="216" font-size="11" font-family="'JetBrains Mono', monospace" fill="#e9eef3">application/vnd.acme.order.</text><text x="439" y="216" font-size="11" font-family="'JetBrains Mono', monospace" fill="#f2a93b" font-weight="700">v2</text><text x="453" y="216" font-size="11" font-family="'JetBrains Mono', monospace" fill="#e9eef3">+json</text><text x="360" y="242" text-anchor="middle" fill="#6b7886" font-size="9.5" font-family="Inter, sans-serif">Обери одне й тримайся послідовно — кожна версія це версія, яку ти підтримуєш.</text></svg>