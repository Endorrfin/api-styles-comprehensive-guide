<svg width="1152" height="499.20000000000005" viewBox="0 0 720 312" class="fig-svg" role="img" aria-label="OAuth 2.1 Authorization Code з PKCE як послідовність між чотирма акторами: User, Client (SPA), Authorization Server і API. Крок 1: client робить запит /authorize з хешованим PKCE code_challenge. Крок 2: користувач автентифікується й дає consent на Authorization Server, тож пароль ніколи не доходить до client-а. Крок 3: одноразовий authorization code редіректить назад до client-а. Крок 4: client постить code плюс початковий code_verifier на /token. Крок 5: Authorization Server повертає access token та ID token. Крок 6: client кличе API з Authorization Bearer токеном. Крок 7: API повертає захищений ресурс."><rect x="0" y="0" width="720" height="312" fill="#0e1217"/><g><rect x="36" y="26" width="88" height="28" rx="7" fill="#1c242e" stroke="#a7b4c2" stroke-width="1.3"></rect><text x="80" y="44" text-anchor="middle" fill="#e9eef3" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700">User</text><line x1="80" y1="54" x2="80" y2="300" stroke="#384556" stroke-width="1" stroke-dasharray="4 5"></line></g><g><rect x="196" y="26" width="108" height="28" rx="7" fill="#1c242e" stroke="#a78bfa" stroke-width="1.3"></rect><text x="250" y="44" text-anchor="middle" fill="#e9eef3" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700">Client (SPA)</text><line x1="250" y1="54" x2="250" y2="300" stroke="#384556" stroke-width="1" stroke-dasharray="4 5"></line></g><g><rect x="396" y="26" width="128" height="28" rx="7" fill="#1c242e" stroke="#4dc4d4" stroke-width="1.3"></rect><text x="460" y="44" text-anchor="middle" fill="#e9eef3" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700">Auth Server</text><line x1="460" y1="54" x2="460" y2="300" stroke="#384556" stroke-width="1" stroke-dasharray="4 5"></line></g><g><rect x="604" y="26" width="92" height="28" rx="7" fill="#1c242e" stroke="#5b9bd5" stroke-width="1.3"></rect><text x="650" y="44" text-anchor="middle" fill="#e9eef3" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700">API</text><line x1="650" y1="54" x2="650" y2="300" stroke="#384556" stroke-width="1" stroke-dasharray="4 5"></line></g><line x1="250" y1="92" x2="452" y2="92" stroke="#a78bfa" stroke-width="1.6"></line><polygon points="460,92 451,88 451,96" fill="#a78bfa"></polygon><circle cx="250" cy="92" r="8.5" fill="#151b23" stroke="#a78bfa" stroke-width="1.2"></circle><text x="250" y="95.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">1</text><text x="358" y="86" text-anchor="middle" fill="#a7b4c2" font-size="9" font-family="Inter, sans-serif">GET /authorize · code_challenge</text><text x="358" y="106" text-anchor="middle" fill="#f2a93b" font-size="8.5" font-family="'JetBrains Mono', monospace" font-weight="700">PKCE</text><line x1="80" y1="132" x2="452" y2="132" stroke="#a7b4c2" stroke-width="1.4"></line><polygon points="460,132 451,128 451,136" fill="#a7b4c2"></polygon><circle cx="80" cy="132" r="8.5" fill="#151b23" stroke="#a7b4c2" stroke-width="1.2"></circle><text x="80" y="135.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">2</text><text x="250" y="126" text-anchor="middle" fill="#a7b4c2" font-size="9" font-family="Inter, sans-serif">authenticate + consent</text><text x="250" y="146" text-anchor="middle" fill="#f2a93b" font-size="8" font-family="Inter, sans-serif" font-style="italic">пароль лишається на AS</text><line x1="460" y1="172" x2="258" y2="172" stroke="#4dc4d4" stroke-width="1.6"></line><polygon points="250,172 259,168 259,176" fill="#4dc4d4"></polygon><circle cx="460" cy="172" r="8.5" fill="#151b23" stroke="#4dc4d4" stroke-width="1.2"></circle><text x="460" y="175.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">3</text><text x="358" y="166" text-anchor="middle" fill="#a7b4c2" font-size="9" font-family="Inter, sans-serif">редірект · одноразовий code</text><line x1="250" y1="210" x2="452" y2="210" stroke="#a78bfa" stroke-width="1.6"></line><polygon points="460,210 451,206 451,214" fill="#a78bfa"></polygon><circle cx="250" cy="210" r="8.5" fill="#151b23" stroke="#a78bfa" stroke-width="1.2"></circle><text x="250" y="213.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">4</text><text x="358" y="204" text-anchor="middle" fill="#a7b4c2" font-size="9" font-family="Inter, sans-serif">POST /token · code + code_verifier</text><line x1="460" y1="248" x2="258" y2="248" stroke="#6cc24a" stroke-width="1.8"></line><polygon points="250,248 259,244 259,252" fill="#6cc24a"></polygon><circle cx="460" cy="248" r="8.5" fill="#151b23" stroke="#6cc24a" stroke-width="1.2"></circle><text x="460" y="251.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">5</text><text x="358" y="242" text-anchor="middle" fill="#6cc24a" font-size="9" font-family="Inter, sans-serif" font-weight="600">access token (+ ID token)</text><line x1="250" y1="280" x2="642" y2="280" stroke="#6cc24a" stroke-width="1.8"></line><polygon points="650,280 641,276 641,284" fill="#6cc24a"></polygon><circle cx="250" cy="280" r="8.5" fill="#151b23" stroke="#6cc24a" stroke-width="1.2"></circle><text x="250" y="283.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">6</text><text x="452" y="274" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">Authorization: Bearer</text><line x1="650" y1="300" x2="258" y2="300" stroke="#6b7886" stroke-width="1.3" stroke-dasharray="4 3"></line><polygon points="250,300 259,296 259,304" fill="#6b7886"></polygon><circle cx="650" cy="300" r="8.5" fill="#151b23" stroke="#6b7886" stroke-width="1.2"></circle><text x="650" y="303.5" text-anchor="middle" fill="#e9eef3" font-size="9" font-family="'JetBrains Mono', monospace" font-weight="700">7</text><text x="452" y="294" text-anchor="middle" fill="#6b7886" font-size="9" font-family="Inter, sans-serif">захищений ресурс</text></svg>