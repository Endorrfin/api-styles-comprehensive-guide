<svg width="1152" height="537.6" viewBox="0 0 720 336" class="fig-svg" role="img" aria-label="An RFC 9457 application/problem+json error body for a 422 response. Members: type is a URI naming the problem kind and is the stable key clients branch on; title is a short human summary; status echoes 422; detail explains this occurrence; instance identifies this occurrence; and an errors array is an extension member listing field violations. Below, the same logical error mapped to three styles: REST uses application/problem+json with a type; gRPC uses a grpc-status code 3 INVALID_ARGUMENT plus google.rpc.Status details; GraphQL returns 200 with an errors array carrying extensions.code."><rect x="0" y="0" width="720" height="336" fill="#0e1217"/><rect x="20" y="16" width="452" height="218" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="20" y="16" width="4" height="218" rx="2" fill="#f87171"></rect><text x="38" y="42" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#f87171" font-weight="700">422</text><text x="72" y="42" font-size="12.5" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">Unprocessable Content</text><text x="38" y="60" font-size="10" font-family="'JetBrains Mono', monospace" fill="#6b7886">Content-Type: application/problem+json</text><text x="38" y="84" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">{</text><text x="50" y="104" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a78bfa" font-weight="700">&quot;type&quot;:</text><text x="134" y="104" font-size="11" font-family="'JetBrains Mono', monospace" fill="#e9eef3">&quot;/problems/invalid-amount&quot;,</text><text x="50" y="123" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">&quot;title&quot;:</text><text x="134" y="123" font-size="11" font-family="'JetBrains Mono', monospace" fill="#6b7886">&quot;Invalid amount&quot;,</text><text x="50" y="142" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">&quot;status&quot;:</text><text x="134" y="142" font-size="11" font-family="'JetBrains Mono', monospace" fill="#f87171" font-weight="700">422,</text><text x="50" y="161" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">&quot;detail&quot;:</text><text x="134" y="161" font-size="11" font-family="'JetBrains Mono', monospace" fill="#f2a93b">&quot;amount must be &gt; 0&quot;,</text><text x="50" y="180" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">&quot;instance&quot;:</text><text x="134" y="180" font-size="11" font-family="'JetBrains Mono', monospace" fill="#6b7886">&quot;/payments/6f1a&quot;,</text><text x="50" y="199" font-size="11" font-family="'JetBrains Mono', monospace" fill="#4dc4d4" font-weight="700">&quot;errors&quot;:</text><text x="134" y="199" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">[{ &quot;field&quot;: &quot;amount&quot; }]</text><text x="38" y="219" font-size="11" font-family="'JetBrains Mono', monospace" fill="#a7b4c2">}</text><g><line x1="476" y1="100" x2="490" y2="100" stroke="#a78bfa" stroke-width="1.2"></line><circle cx="496" cy="100" r="3" fill="#a78bfa"></circle><text x="504" y="103" font-size="9" font-family="Inter, sans-serif" fill="#a7b4c2">type — the key you branch on</text></g><g><line x1="476" y1="138" x2="490" y2="138" stroke="#f87171" stroke-width="1.2"></line><circle cx="496" cy="138" r="3" fill="#f87171"></circle><text x="504" y="141" font-size="9" font-family="Inter, sans-serif" fill="#a7b4c2">status — echoes the HTTP code</text></g><g><line x1="476" y1="157" x2="490" y2="157" stroke="#f2a93b" stroke-width="1.2"></line><circle cx="496" cy="157" r="3" fill="#f2a93b"></circle><text x="504" y="160" font-size="9" font-family="Inter, sans-serif" fill="#a7b4c2">detail — human, this occurrence</text></g><g><line x1="476" y1="195" x2="490" y2="195" stroke="#4dc4d4" stroke-width="1.2"></line><circle cx="496" cy="195" r="3" fill="#4dc4d4"></circle><text x="504" y="198" font-size="9" font-family="Inter, sans-serif" fill="#a7b4c2">errors[] — extension member</text></g><text x="20" y="258" font-size="10.5" font-family="Inter, sans-serif" fill="#a7b4c2" font-weight="600">The same error, three channels</text><g><rect x="20" y="268" width="220" height="58" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="20" y="268" width="4" height="58" rx="2" fill="#a78bfa"></rect><text x="36" y="288" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#a78bfa">REST</text><text x="36" y="306" font-size="10" font-family="'JetBrains Mono', monospace" fill="#e9eef3">application/problem+json</text><text x="36" y="320" font-size="9" font-family="Inter, sans-serif" fill="#6b7886">→ branch on type</text></g><g><rect x="250" y="268" width="220" height="58" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="250" y="268" width="4" height="58" rx="2" fill="#4dc4d4"></rect><text x="266" y="288" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#4dc4d4">gRPC</text><text x="266" y="306" font-size="10" font-family="'JetBrains Mono', monospace" fill="#e9eef3">grpc-status: 3</text><text x="266" y="320" font-size="9" font-family="Inter, sans-serif" fill="#6b7886">INVALID_ARGUMENT + details</text></g><g><rect x="480" y="268" width="220" height="58" rx="8" fill="#1c242e" stroke="#384556" stroke-width="1"></rect><rect x="480" y="268" width="4" height="58" rx="2" fill="#f2a93b"></rect><text x="496" y="288" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#f2a93b">GraphQL</text><text x="496" y="306" font-size="10" font-family="'JetBrains Mono', monospace" fill="#e9eef3">200 · errors[]</text><text x="496" y="320" font-size="9" font-family="Inter, sans-serif" fill="#6b7886">extensions.code</text></g></svg>